services:
  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    image: ${AIRFLOW_IMAGE:-ghcr.io/${GHCR_OWNER:-andrius-eng}/ml-airflow-custom:latest}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
    environment:
      BEAM_RUNNER: PortableRunner
      BEAM_PIPELINE_ARGS: --flink_master=flink-jobmanager:8081 --parallelism=2 --environment_type=EXTERNAL --environment_config=beam-worker-pool:50000 --no-fetch-missing-cities
    volumes: &id001
    - airflow-data:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - .:/opt/airflow/project
  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-ghcr.io/${GHCR_OWNER:-andrius-eng}/ml-airflow-custom:latest}
    command: webserver
    ports:
    - 8080:8080
    environment:
      BEAM_RUNNER: PortableRunner
      BEAM_PIPELINE_ARGS: --flink_master=flink-jobmanager:8081 --parallelism=2 --environment_type=EXTERNAL --environment_config=beam-worker-pool:50000 --no-fetch-missing-cities
    depends_on:
    - airflow-init
    volumes: *id001
    restart: unless-stopped
    networks:
      - default
  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-ghcr.io/${GHCR_OWNER:-andrius-eng}/ml-airflow-custom:latest}
    command: scheduler
    depends_on:
      - airflow-init
      - flink-jobmanager
      - flink-taskmanager
      - beam-job-server
      - beam-worker-pool
    environment:
      BEAM_RUNNER: PortableRunner
      BEAM_PIPELINE_ARGS: --flink_master=flink-jobmanager:8081 --parallelism=2 --environment_type=EXTERNAL --environment_config=beam-worker-pool:50000 --no-fetch-missing-cities
    volumes: *id001
    restart: unless-stopped
    networks:
      - default
  flink-jobmanager:
    image: flink:1.20.1-scala_2.12-java11
    command: jobmanager
    ports:
    - 8082:8081
    environment:
      FLINK_PROPERTIES: 'jobmanager.rpc.address: flink-jobmanager

        '
    restart: unless-stopped
    networks:
    - default
  flink-taskmanager:
    image: flink:1.20.1-scala_2.12-java11
    command: taskmanager
    environment:
      FLINK_PROPERTIES: 'jobmanager.rpc.address: flink-jobmanager

        taskmanager.numberOfTaskSlots: 4

        taskmanager.memory.network.fraction: 0.2

        taskmanager.memory.network.min: 268435456

        taskmanager.memory.network.max: 1073741824

        '
    depends_on:
    - flink-jobmanager
    restart: unless-stopped
    networks:
    - default
  beam-worker-pool:
    image: apache/beam_python3.12_sdk:2.71.0
    command: ["--worker_pool"]
    ports:
      - "50001:50000"
    networks:
      - default
    depends_on:
      - flink-jobmanager
    restart: unless-stopped

  beam-job-server:
    image: apache/beam_flink1.20_job_server:2.71.0
    command: ["--flink-master=flink-jobmanager:8081"]
    ports:
      - "8100:8098"
      - "8101:8099"
    networks:
      - default
    depends_on:
      - flink-jobmanager
      - beam-worker-pool
    restart: unless-stopped

  beam-submitter:
    image: apache/beam_python3.12_sdk:2.71.0
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: tail -f /dev/null
    networks:
      - default
    depends_on:
      - flink-jobmanager
      - beam-worker-pool

  ws-server:
    build:
      context: ..
      dockerfile: docker/ws-server/Dockerfile
    image: ${WS_IMAGE:-ghcr.io/${GHCR_OWNER:-andrius-eng}/ml-ws-server:latest}
    ports:
    - 3000:3000
    environment:
      PROJECT_ROOT: /project
      DASHBOARD_WS_HOST: 0.0.0.0
      DASHBOARD_WS_TOKEN: ${DASHBOARD_WS_TOKEN:-}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3600000}
    volumes:
    - ..:/project:rw
    - dashboard-data:/project/src/data
    depends_on:
    - airflow-scheduler
    restart: unless-stopped
    networks:
    - default
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    image: ${FRONTEND_IMAGE:-ghcr.io/${GHCR_OWNER:-andrius-eng}/ml-frontend:latest}
    ports:
    - 5173:80
    volumes:
    - dashboard-data:/usr/share/nginx/html/data
    depends_on:
    - ws-server
    - ml-server
    restart: unless-stopped
    networks:
    - default
  ml-server:
    build:
      context: ..
      dockerfile: docker/ml-pipeline/Dockerfile
    image: ${PIPELINE_IMAGE:-ghcr.io/${GHCR_OWNER:-andrius-eng}/ml-ml-pipeline:latest}
    command: sh -c "cd /app/python && python -m uvicorn serve:app --host 0.0.0.0 --port
      8000"
    ports:
    - 8000:8000
    environment:
      ML_OUTPUT_DIR: /project/python/output
      RAG_LLM_PROVIDER: ${RAG_LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    volumes:
    - ..:/project:rw
    - ../python/output/beam:/project/python/output/beam
    - ../python/output/rag:/project/python/output/rag
    - dashboard-data:/project/src/data
    restart: unless-stopped
    networks:
    - default
    depends_on:
    - ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
    - 11434:11434
    volumes:
    - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
    - default
volumes:
  airflow-data:
    driver: local
  dashboard-data:
    driver: local
  ollama-data:
    driver: local
networks:
  default:
    name: ml-stack
