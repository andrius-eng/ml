# Airflow init Job runs db migrate + user creation once, then exits.
# Webserver and Scheduler wait for the Job via initContainers.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: ml-stack
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do sleep 2; done"]
      containers:
        - name: airflow-init
          image: ghcr.io/andrius-eng/ml-airflow-custom:latest
          command:
            - /bin/bash
            - -c
            - |
              airflow db migrate
              airflow users create --username admin --password admin \
                --firstname Airflow --lastname Admin \
                --role Admin --email admin@example.com || true
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: ml-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do sleep 2; done"]
      containers:
        - name: webserver
          image: ghcr.io/andrius-eng/ml-airflow-custom:latest
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: ml-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do sleep 2; done"]
      containers:
        - name: scheduler
          image: ghcr.io/andrius-eng/ml-airflow-custom:latest
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 2Gi
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
