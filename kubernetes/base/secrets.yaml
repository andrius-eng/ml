apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: ml-stack
type: Opaque
stringData:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres:5432/airflow"
  AIRFLOW__CORE__FERNET_KEY: "changeme-generate-with-fernet_key-utility"
  AIRFLOW__WEBSERVER__SECRET_KEY: "changeme-strong-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: ml-stack
type: Opaque
stringData:
  POSTGRES_USER: "airflow"
  POSTGRES_PASSWORD: "airflow"
  POSTGRES_DB: "airflow"
