apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ml-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.10.1
          command:
            - /bin/sh
            - -c
            - |
              mlflow db upgrade sqlite:////mlruns/mlflow.db && \
              mlflow server \
                --backend-store-uri sqlite:////mlruns/mlflow.db \
                --default-artifact-root file:///mlartifacts \
                --serve-artifacts \
                --host 0.0.0.0 \
                --port 5000
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlruns
            - name: mlflow-artifacts
              mountPath: /mlartifacts
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts