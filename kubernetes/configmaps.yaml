apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: ml-stack
data:
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__PARALLELISM: "2"
  AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"
  AIRFLOW__WEBSERVER__WORKERS: "2"
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver:8080/execution/"
  AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "changeme-strong-secret"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:Admin"
  # Format: "username:role" — password is auto-generated to $AIRFLOW_HOME/simple_auth_manager_passwords.json.generated
  AIRFLOW__SCHEDULER__STANDALONE_DAG_PROCESSOR: "True"
  AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT: "120"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
  PYTHONWARNINGS: "ignore::SyntaxWarning"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  ML_PROJECT_ROOT: "/opt/airflow/project"
  BEAM_RUNNER: "PortableRunner"
  BEAM_PIPELINE_ARGS: "--flink_master=flink-jobmanager:8081 --parallelism=1 --environment_type=EXTERNAL --environment_config=flink-taskmanager:50000 --no-fetch-missing-cities"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: ml-stack
data:
  flink-conf.yaml: |
    jobmanager.rpc.address: flink-jobmanager
    jobmanager.archive.fs.dir: file:///opt/flink/job-archives
    taskmanager.host: flink-taskmanager
    taskmanager.numberOfTaskSlots: 2
    taskmanager.memory.process.size: 900m
    taskmanager.memory.managed.fraction: 0.1
    taskmanager.memory.network.fraction: 0.1
    taskmanager.memory.network.min: 67108864
    taskmanager.memory.network.max: 134217728
    taskmanager.memory.jvm-overhead.min: 67108864
    env.java.opts.taskmanager: -XX:MaxDirectMemorySize=128m
    historyserver.web.address: 0.0.0.0
    historyserver.web.port: 8082
    historyserver.archive.fs.dir: file:///opt/flink/job-archives
    historyserver.archive.fs.expiry-time: 604800000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-server-config
  namespace: ml-stack
data:
  ML_OUTPUT_DIR: "/project/python/output"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  RAG_LLM_PROVIDER: "ollama"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.1:8b"
