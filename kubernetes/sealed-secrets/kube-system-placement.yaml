# Pin k3s-managed Helm components to the infra node.
# k3s reads HelmChartConfig resources and merges their valuesContent into the
# chart's own values before each Helm install/upgrade, so these patches survive
# k3s server restarts and upgrades without manual kubectl intervention.
#
# Components covered:
#   traefik        – managed by kubernetes/overlays/k3s/system/traefik-config.yaml
#                   (ml-system ArgoCD app); nodeSelector and Gateway provider
#                   are both configured there to avoid resource ownership conflicts.
#   metrics-server – cluster-level metrics API; lives next to the API server
#
# coredns is a k3s built-in add-on (not Helm);
# patch it manually after node recovery:
#   kubectl patch deployment coredns -n kube-system \
#     --type=json -p='[{"op":"add","path":"/spec/template/spec/nodeSelector",
#     "value":{"workload-role":"infra"}}]'
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  valuesContent: |-
    nodeSelector:
      workload-role: infra
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
