# Pin k3s-managed Helm components to the infra node.
# k3s reads HelmChartConfig resources and merges their valuesContent into the
# chart's own values before each Helm install/upgrade, so these patches survive
# k3s server restarts and upgrades without manual kubectl intervention.
#
# Components covered:
#   traefik        – ingress proxy; must not land on a flaky compute node
#   metrics-server – cluster-level metrics API; lives next to the API server
#
# coredns and local-path-provisioner are k3s built-in add-ons (not Helm);
# patch those manually after node recovery:
#   kubectl patch deployment coredns -n kube-system \
#     --type=json -p='[{"op":"add","path":"/spec/template/spec/nodeSelector",
#     "value":{"workload-role":"infra"}}]'
#   kubectl patch deployment local-path-provisioner -n kube-system \
#     --type=json -p='[{"op":"add","path":"/spec/template/spec/nodeSelector",
#     "value":{"workload-role":"infra"}}]'
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    nodeSelector:
      workload-role: infra
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  valuesContent: |-
    nodeSelector:
      workload-role: infra
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
