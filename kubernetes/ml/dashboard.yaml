---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-server
  namespace: ml-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-server
  template:
    metadata:
      labels:
        app: ml-server
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 90
              preference:
                matchExpressions:
                  - key: workload-role
                    operator: In
                    values: ["compute"]
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 500
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-mlflow
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mlflow 5000; do echo waiting for mlflow; sleep 5; done"]
      containers:
        - name: ml-server
          image: ghcr.io/andrius-eng/ml-ml-pipeline:placeholder
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "cd /project/python && python -m uvicorn serve:app --host 0.0.0.0 --port 8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ml-server-config
          volumeMounts:
            - name: project
              mountPath: /project
              subPath: project
            - name: ml-output
              mountPath: /project/python/output
            - name: dashboard-data
              mountPath: /project/src/data
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: project
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-server
  namespace: ml-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ws-server
  template:
    metadata:
      labels:
        app: ws-server
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 90
              preference:
                matchExpressions:
                  - key: workload-role
                    operator: In
                    values: ["compute"]
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 500
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ws-server
          image: ghcr.io/andrius-eng/ml-ws-server:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PROJECT_ROOT
              value: /project
            - name: DASHBOARD_WS_HOST
              value: "0.0.0.0"
            - name: POLL_INTERVAL_MS
              value: "3600000"
            - name: DASHBOARD_WS_TOKEN
              value: ""
          volumeMounts:
            - name: project
              mountPath: /project
              subPath: project
            - name: ml-output
              mountPath: /project/python/output
            - name: dashboard-data
              mountPath: /project/src/data
          resources:
            requests:
              cpu: 60m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 200Mi
      volumes:
        - name: project
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ml-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 90
              preference:
                matchExpressions:
                  - key: workload-role
                    operator: In
                    values: ["compute"]
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 500
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/andrius-eng/ml-frontend:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: dashboard-data
              mountPath: /usr/share/nginx/html/data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ml-stack
spec:
  replicas: 0
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: high-memory
                    operator: In
                    values: ["true"]
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              SERVER_PID=$!
              echo "Waiting for ollama server to be ready..."
              until ollama list > /dev/null 2>&1; do sleep 2; done
              echo "Pulling llama3.2:1b..."
              ollama pull llama3.2:1b
              echo "Model ready."
              wait $SERVER_PID
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 6Gi
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
