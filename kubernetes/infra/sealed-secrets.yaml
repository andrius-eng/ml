---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: airflow-secrets
  namespace: ml-stack
spec:
  encryptedData:
    AIRFLOW__CORE__FERNET_KEY: 
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: 
    AIRFLOW__WEBSERVER__SECRET_KEY: 
  template:
    metadata:
      name: airflow-secrets
      namespace: ml-stack
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-secrets
  namespace: ml-stack
spec:
  encryptedData:
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: postgres-secrets
      namespace: ml-stack
    type: Opaque
