# PersistentVolumeClaims — base (provider-agnostic).
# No storageClassName: cluster default StorageClass is used.
# Overlays add storageClassName, static PVs, and volumeName bindings:
#   kubernetes/overlays/k3s/infra/  — k3s local-path + NFS
#   kubernetes/overlays/eks/infra/  — EBS gp3 + EFS
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data
  namespace: ml-stack
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 5Gi
---
