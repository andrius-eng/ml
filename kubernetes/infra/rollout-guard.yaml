---
# ArgoCD rollout guard: pre-pull the infra-only custom image before singleton
# Airflow workloads are recreated on the single infra node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prepull-infra-images
  namespace: ml-stack
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-2"
spec:
  selector:
    matchLabels:
      app: prepull-infra-images
  template:
    metadata:
      labels:
        app: prepull-infra-images
    spec:
      nodeSelector:
        workload-role: infra
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 0
      initContainers:
        - name: pull-airflow-custom
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo airflow image ready"]
      containers:
        - name: hold
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
# ArgoCD rollout guard: pre-pull the compute-node custom images before
# singleton dashboard workloads are updated on any compute node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prepull-compute-images
  namespace: ml-stack
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-2"
spec:
  selector:
    matchLabels:
      app: prepull-compute-images
  template:
    metadata:
      labels:
        app: prepull-compute-images
    spec:
      nodeSelector:
        workload-role: compute
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 0
      initContainers:
        - name: pull-ml-pipeline
          image: ghcr.io/andrius-eng/ml-ml-pipeline:placeholder
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo ml pipeline image ready"]
        - name: pull-ws-server
          image: ghcr.io/andrius-eng/ml-ws-server:placeholder
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo ws-server image ready"]
        - name: pull-frontend
          image: ghcr.io/andrius-eng/ml-frontend:placeholder
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo frontend image ready"]
      containers:
        - name: hold
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi