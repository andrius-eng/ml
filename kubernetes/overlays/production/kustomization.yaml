apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ml-stack

resources:
  - ../../base
  - ml-stack-tls-secret.yaml

patches:
  - path: pvc-patch.yaml
  - path: gateway-tls-patch.yaml
  # Generated by k3s-2.py mode 6 — uncomment once nodes are labeled (mode 5).
  # Pins heavy pods (Ollama, Flink, MLflow) to the Mac worker node.
  # - path: node-affinity-patch.yaml

# Image tags are pinned to the git SHA by the docker-images CI workflow.
# Update with: bash scripts/pin-images.sh <sha>
images:
  - name: ghcr.io/andrius-eng/ml-airflow-custom
    newTag: latest
  - name: ghcr.io/andrius-eng/ml-ml-pipeline
    newTag: latest
  - name: ghcr.io/andrius-eng/ml-frontend
    newTag: latest
  - name: ghcr.io/andrius-eng/ml-ws-server
    newTag: latest
