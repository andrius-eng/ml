---
# Traefik StripPrefix middlewares — strips the path prefix before forwarding
# to backends that serve from / (flink, mlflow, ml-server).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: ml-stack
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-flink
  namespace: ml-stack
spec:
  stripPrefix:
    prefixes:
      - /flink
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-mlflow
  namespace: ml-stack
spec:
  stripPrefix:
    prefixes:
      - /mlflow
---
# Separate Ingress for /api — needs prefix stripped before reaching ml-server
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-stack-api-ingress
  namespace: ml-stack
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: ml-stack-strip-api@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: ml-stack.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ml-server
                port:
                  number: 8000
---
# Separate Ingress for /flink — Flink UI serves from /
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-stack-flink-ingress
  namespace: ml-stack
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: ml-stack-strip-flink@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: ml-stack.local
      http:
        paths:
          - path: /flink
            pathType: Prefix
            backend:
              service:
                name: flink-jobmanager
                port:
                  number: 8081
---
# Separate Ingress for /mlflow — MLflow serves from /
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-stack-mlflow-ingress
  namespace: ml-stack
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: ml-stack-strip-mlflow@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: ml-stack.local
      http:
        paths:
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
