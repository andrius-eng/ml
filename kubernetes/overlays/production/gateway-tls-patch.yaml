# Patches the base Gateway to add an HTTPS listener using the ml-stack-tls secret.
# Port 8443 matches Traefik's internal 'websecure' entrypoint
# (k3s service maps external :443 → container :8443).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ml-stack-gateway
  namespace: ml-stack
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      port: 8000
      protocol: HTTP
      hostname: ml-stack.local
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 8443
      protocol: HTTPS
      hostname: ml-stack.local
      tls:
        mode: Terminate
        certificateRefs:
          - name: ml-stack-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
