# Production PVC patch — set storageClassName to your cluster's RWX class.
# Common options: nfs-client, efs-sc (AWS), azurefile (Azure), cephfs (Rook)
# RWO claims (postgres, ollama) use cluster default block class ("").
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data
  namespace: ml-stack
spec:
  storageClassName: nfs-client   # replace with your RWX class
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-output
  namespace: ml-stack
spec:
  storageClassName: nfs-client
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-data
  namespace: ml-stack
