# Production PVC patch — storageClassName set to k3s-hostpath (manual PVs bound).
# Update to nfs-client / efs-sc / azurefile when migrating to a real NFS class.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data
  namespace: ml-stack
spec:
  storageClassName: k3s-hostpath
