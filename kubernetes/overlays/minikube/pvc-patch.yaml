# Minikube/k3s: use k3s-hostpath StorageClass (hostPath). Works for RWX on single-node.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data
  namespace: ml-stack
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: k3s-hostpath
---
