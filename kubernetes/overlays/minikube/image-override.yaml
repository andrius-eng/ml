apiVersion: apps/v1
kind: Deployment
metadata:
  name: beam-job-server
spec:
  template:
    spec:
      containers:
        - name: job-server
          image: ghcr.io/andrius-eng/ml-ml-pipeline:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "sleep 86400"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
spec:
  template:
    spec:
      containers:
        - name: jobmanager
          image: ghcr.io/andrius-eng/ml-ml-pipeline:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "sleep 86400"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
spec:
  template:
    spec:
      containers:
        - name: taskmanager
          image: ghcr.io/andrius-eng/ml-ml-pipeline:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "sleep 86400"]
        - name: beam-worker-pool
          image: ghcr.io/andrius-eng/ml-ml-pipeline:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "sleep 86400"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-history-server
spec:
  template:
    spec:
      containers:
        - name: history-server
          image: ghcr.io/andrius-eng/ml-ml-pipeline:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "sleep 86400"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  template:
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "sleep 86400"]
