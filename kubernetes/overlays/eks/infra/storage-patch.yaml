# EKS storage class patches.
# Prerequisites:
#   - aws-efs-csi-driver installed with StorageClass named "efs-sc"
# All PVCs use shared RWX provisioning so workloads can reschedule across nodes
# without storage-mode lock-in.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-output
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-data
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beam-artifacts
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-job-archives
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: ml-stack
spec:
  storageClassName: efs-sc
