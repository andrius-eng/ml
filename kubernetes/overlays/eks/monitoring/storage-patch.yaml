# EKS storage class patches for monitoring PVCs (shared RWX EFS).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: ml-stack
spec:
  storageClassName: efs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: ml-stack
spec:
  storageClassName: efs-sc
