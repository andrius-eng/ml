# EKS storage class patches for monitoring PVCs (gp3 EBS).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: ml-stack
spec:
  storageClassName: gp3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: ml-stack
spec:
  storageClassName: gp3
