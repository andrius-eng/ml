# k3s/Traefik 3.x GatewayClass — cluster-scoped, lives here not in base.
# Requires: kubectl apply -f kubernetes/overlays/k3s/networking/gatewayclass.yaml
# (separate from kustomize to avoid namespace injection by kustomize).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller
