# k3s Gateway patch — replaces the portable base spec with Traefik + Tailscale listeners.
# Port 8000 = Traefik 'web' entrypoint (k3s maps :80  → container :8000).
# Port 8443 = Traefik 'websecure' entrypoint (k3s maps :443 → container :8443).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ml-stack-gateway
  namespace: ml-stack
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      port: 8000
      protocol: HTTP
      hostname: ml-stack.local
      allowedRoutes:
        namespaces:
          from: All
    - name: http-tailscale
      port: 8000
      protocol: HTTP
      hostname: "desktop-nnutaj7.tail6964b3.ts.net"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-tailscale
      port: 8443
      protocol: HTTPS
      hostname: "desktop-nnutaj7.tail6964b3.ts.net"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: tailscale-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http-any
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# HTTPRoute hostname overrides — restrict host-sensitive routes to known hostnames.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ws-server
  namespace: ml-stack
spec:
  hostnames:
    - ml-stack.local
    - desktop-nnutaj7.tail6964b3.ts.net
---
apiVersion: gateway.networking.k8s.io/v1
