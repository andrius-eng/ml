apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ml-stack

resources:
  - namespace.yaml
  - sealed-secrets.yaml
  - configmaps.yaml
  - pvcs.yaml
  - postgres.yaml
  - airflow.yaml
  - flink-beam.yaml
  - mlflow.yaml
  - dashboard.yaml
  - services.yaml
  - tailscale-tls.yaml
  - gateway.yaml
  - gatewayclass.yaml
  - monitoring.yaml

# Image tags — updated to pinned SHA by CI after each successful build.
# Managed by scripts/pin-images.sh
images:
  - name: ghcr.io/andrius-eng/ml-airflow-custom
    newTag: b9fb5f18d49d1148513b9c1315b2b507fd616244
  - name: ghcr.io/andrius-eng/ml-ml-pipeline
    newTag: b9fb5f18d49d1148513b9c1315b2b507fd616244
  - name: ghcr.io/andrius-eng/ml-frontend
    newTag: b9fb5f18d49d1148513b9c1315b2b507fd616244
  - name: ghcr.io/andrius-eng/ml-ws-server
    newTag: b9fb5f18d49d1148513b9c1315b2b507fd616244
