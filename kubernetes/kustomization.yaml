apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ml-stack

resources:
  - namespace.yaml
  - secrets.yaml
  - configmaps.yaml
  - pvcs.yaml
  - postgres.yaml
  - airflow.yaml
  - flink-beam.yaml
  - mlflow.yaml
  - dashboard.yaml
  - services.yaml
  - gateway.yaml
  - gatewayclass.yaml

# Image tags — updated to pinned SHA by CI after each successful build.
# Managed by scripts/pin-images.sh
images:
  - name: ghcr.io/andrius-eng/ml-airflow-custom
    newTag: c18e9bc496022406f2231d4ef55b49cecc7b7c72
  - name: ghcr.io/andrius-eng/ml-ml-pipeline
    newTag: c18e9bc496022406f2231d4ef55b49cecc7b7c72
  - name: ghcr.io/andrius-eng/ml-frontend
    newTag: c18e9bc496022406f2231d4ef55b49cecc7b7c72
  - name: ghcr.io/andrius-eng/ml-ws-server
    newTag: c18e9bc496022406f2231d4ef55b49cecc7b7c72
