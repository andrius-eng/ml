apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: ml-stack
type: Opaque
stringData:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:replace-me@postgres:5432/airflow"
  AIRFLOW__CORE__FERNET_KEY: "replace-me-generate-with-fernet-key"
  AIRFLOW__WEBSERVER__SECRET_KEY: "replace-me-strong-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: ml-stack
type: Opaque
stringData:
  POSTGRES_USER: "airflow"
  POSTGRES_PASSWORD: "replace-me"
  POSTGRES_DB: "airflow"