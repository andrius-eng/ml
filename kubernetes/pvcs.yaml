# storageClassName: k3s-hostpath — rancher local-path (single node). Replace with Longhorn/NFS for true RWX multi-node.
# RWX (k3s-hostpath supports RWX on single node): airflow-data, ml-output
# RWO sufficient for: postgres-data, ollama-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data
  namespace: ml-stack
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 5Gi
  storageClassName: k3s-hostpath
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-output
  namespace: ml-stack
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 10Gi
  storageClassName: k3s-hostpath
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-data
  namespace: ml-stack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 512Mi
  storageClassName: k3s-hostpath
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: ml-stack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
  storageClassName: k3s-hostpath
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: ml-stack
spec:
  accessModes: [ReadWriteOnce]
  volumeName: pv-mlflow-data
  resources:
    requests:
      storage: 5Gi
