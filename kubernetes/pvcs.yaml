# Static NFS PVs for cross-node RWX volumes (server: 100.95.8.71)
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-airflow-data-nfs
spec:
  capacity:
    storage: 5Gi
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: "100.95.8.71"
    path: "/data/k8s-nfs/airflow-data"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-ml-output-nfs
spec:
  capacity:
    storage: 10Gi
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: "100.95.8.71"
    path: "/data/k8s-nfs/ml-output"
# Storage classes used below:
# - k3s-hostpath: single-node RWO/RWX (WARNING: RWX is NOT shared across nodes)
# - nfs-client: true cross-node RWX (run scripts/setup-nfs-storage.sh first)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data
  namespace: ml-stack
spec:
  accessModes: [ReadWriteMany]
  volumeName: pv-airflow-data-nfs
  resources:
    requests:
      storage: 5Gi
  storageClassName: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-output
  namespace: ml-stack
spec:
  accessModes: [ReadWriteMany]
  volumeName: pv-ml-output-nfs
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""
---
