# Patch all ArgoCD components to run on the infra node (workload-role=infra).
# ArgoCD is cluster-management tooling — keep it off the compute/data nodes.
#
# Applied manually when ArgoCD is installed externally:
#   kubectl patch deployment -n argocd argocd-server --type=json \
#     -p='[{"op":"replace","path":"/spec/template/spec/nodeSelector","value":{"workload-role":"infra","kubernetes.io/os":"linux"}}]'
# (and similarly for the other components — see fix script below)
#
# These are strategic-merge patches applied via Kustomize when the ArgoCD
# install manifest is also present in the resources list.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        workload-role: infra
        kubernetes.io/os: linux
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        workload-role: infra
        kubernetes.io/os: linux
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        workload-role: infra
        kubernetes.io/os: linux
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        workload-role: infra
        kubernetes.io/os: linux
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-applicationset-controller
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        workload-role: infra
        kubernetes.io/os: linux
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-notifications-controller
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        workload-role: infra
        kubernetes.io/os: linux
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        workload-role: infra
        kubernetes.io/os: linux
