# Gateway API resources — replaces Ingress.
# Requires Traefik 3.x with kubernetesGateway provider enabled.
# See kubernetes/scripts/setup-gateway.sh for prerequisites.
#
# NOTE: GatewayClass is cluster-scoped and lives in gatewayclass.yaml
# to avoid kustomize injecting a namespace on it.
---
# Gateway — HTTP entry point.
# Port 8000 matches Traefik's internal 'web' entrypoint
# (k3s service maps external :80 → container :8000).
# Port 8443 matches Traefik's internal 'websecure' entrypoint
# (k3s service maps external :443 → container :8443).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ml-stack-gateway
  namespace: ml-stack
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      port: 8000
      protocol: HTTP
      hostname: ml-stack.local
      allowedRoutes:
        namespaces:
          from: All
    - name: http-tailscale
      port: 8000
      protocol: HTTP
      hostname: "desktop-nnutaj7.tail6964b3.ts.net"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-tailscale
      port: 8443
      protocol: HTTPS
      hostname: "desktop-nnutaj7.tail6964b3.ts.net"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: tailscale-tls
      allowedRoutes:
        namespaces:
          from: All
    # Catch-all: accepts any Host (raw IPs, short MagicDNS name, etc.)
    - name: http-any
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# Frontend — catch-all, lowest specificity.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
---
# WebSocket server — /ws prefix, no strip (ws-server handles its own /ws path).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ws-server
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  hostnames:
    - ml-stack.local
    - desktop-nnutaj7.tail6964b3.ts.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - name: ws-server
          port: 3000
---
# ML API — strip /api prefix; ml-server serves from /.
# Extended timeout to 120s to accommodate Ollama LLM inference (40-60s warm).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ml-server
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      timeouts:
        request: "120s"
        backendRequest: "120s"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: ml-server
          port: 8000
---
# Airflow API server — /airflow prefix, no strip.
# Note: configure AIRFLOW__API__BASE_URL=/airflow so the UI renders with the
# correct subpath base href and router links.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: airflow
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  hostnames:
    - ml-stack.local
    - desktop-nnutaj7.tail6964b3.ts.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /airflow
      backendRefs:
        - name: airflow-webserver
          port: 8080
---
# Flink History Server — redirect bare /flink-history to canonical path.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flink-history-canonical
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  hostnames:
    - ml-stack.local
    - desktop-nnutaj7.tail6964b3.ts.net
  rules:
    - matches:
        - path:
            type: Exact
            value: /flink-history
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /flink-history/
            statusCode: 301
---
# Flink History Server UI — strip /flink-history/ prefix; History Server serves from /.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flink-history
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  hostnames:
    - ml-stack.local
    - desktop-nnutaj7.tail6964b3.ts.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /flink-history/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: flink-history-server
          port: 8082
---
# Flink UI — redirect bare /flink to the slash-suffixed canonical path.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flink-canonical
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  hostnames:
    - ml-stack.local
    - desktop-nnutaj7.tail6964b3.ts.net
  rules:
    - matches:
        - path:
            type: Exact
            value: /flink
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /flink/
            statusCode: 301
---
# Flink UI — strip /flink/ prefix; Flink serves from /.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flink
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  hostnames:
    - ml-stack.local
    - desktop-nnutaj7.tail6964b3.ts.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /flink/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: flink-jobmanager
          port: 8081
---
# ArgoCD — redirect bare /argocd to canonical path.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-canonical
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  rules:
    - matches:
        - path:
            type: Exact
            value: /argocd
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /argocd/
            statusCode: 301
---
# ArgoCD UI — no prefix strip; argocd-server uses --rootpath=/argocd.
# Cross-namespace backendRef allowed by ReferenceGrant in argocd namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argocd
      backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80
---
# ReferenceGrant: allow ml-stack HTTPRoutes to reference argocd-server service.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: argocd-from-ml-stack
  namespace: argocd
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: ml-stack
  to:
    - group: ""
      kind: Service
      name: argocd-server
---
# MLflow — redirect bare /mlflow to the slash-suffixed canonical path.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mlflow-canonical
  namespace: ml-stack
spec:
  parentRefs:
    - name: ml-stack-gateway
