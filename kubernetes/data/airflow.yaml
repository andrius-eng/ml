# Airflow init Job runs db migrate + user creation once, then exits.
# Webserver and Scheduler wait for the Job via initContainers.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: ml-stack
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 90
              preference:
                matchExpressions:
                  - key: workload-role
                    operator: In
                    values: ["compute"]
      securityContext:
        runAsUser: 50000
        runAsGroup: 500
        fsGroup: 500
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do sleep 2; done"]
        - name: db-upgrade
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          command: ["airflow", "db", "migrate"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
      containers:
        - name: airflow-init
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              airflow db migrate
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: ml-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: workload-role
                    operator: In
                    values: ["compute"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: airflow-webserver
      securityContext:
        runAsUser: 50000
        runAsGroup: 500
        fsGroup: 500
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do sleep 2; done"]
      containers:
        - name: webserver
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          command: ["airflow", "api-server", "--host", "0.0.0.0", "--port", "8080", "--workers", "2"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 750m
              memory: 1Gi
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: ml-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 90
              preference:
                matchExpressions:
                  - key: workload-role
                    operator: In
                    values: ["compute"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: airflow-scheduler
      securityContext:
        runAsUser: 50000
        runAsGroup: 500
        fsGroup: 500
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do sleep 2; done"]
        - name: sync-dags
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          # Sync baked-in DAGs from image into the PVC, overwriting stale files so code changes deploy on every rollout
          command: ["sh", "-c", "mkdir -p /mnt/airflow/dags && cp -rf /opt/airflow/dags/. /mnt/airflow/dags/"]
          volumeMounts:
            - name: airflow-data
              mountPath: /mnt/airflow
        - name: sync-python
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          # Sync baked-in python scripts from image into the PVC so pipeline code changes deploy on every rollout
          command: ["sh", "-c", "mkdir -p /mnt/airflow/project/python && cp -rf /opt/airflow/project/python/. /mnt/airflow/project/python/"]
          volumeMounts:
            - name: airflow-data
              mountPath: /mnt/airflow
      containers:
        - name: scheduler
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
            # dashboard-data is the PVC read by ml-server/ws-server/frontend at
            # /project/src/data. Mount it here so export_frontend_data.py writes
            # directly to the same PVC instead of airflow-data (which is shadowed).
            - name: dashboard-data
              mountPath: /opt/airflow/project/src/data
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 2Gi
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: ml-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow-dag-processor
  template:
    metadata:
      labels:
        app: airflow-dag-processor
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 90
              preference:
                matchExpressions:
                  - key: workload-role
                    operator: In
                    values: ["compute"]
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 50000
        runAsGroup: 500
        fsGroup: 500
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do sleep 2; done"]
        - name: sync-dags
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          # Sync baked-in DAGs from image into the PVC, overwriting stale files so code changes deploy on every rollout
          command: ["sh", "-c", "mkdir -p /mnt/airflow/dags && cp -rf /opt/airflow/dags/. /mnt/airflow/dags/"]
          volumeMounts:
            - name: airflow-data
              mountPath: /mnt/airflow
        - name: sync-python
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          # Sync baked-in python scripts from image into the PVC so pipeline code changes deploy on every rollout
          command: ["sh", "-c", "mkdir -p /mnt/airflow/project/python && cp -rf /opt/airflow/project/python/. /mnt/airflow/project/python/"]
          volumeMounts:
            - name: airflow-data
              mountPath: /mnt/airflow
      containers:
        - name: dag-processor
          image: ghcr.io/andrius-eng/ml-airflow-custom:placeholder
          imagePullPolicy: IfNotPresent
          command: ["airflow", "dag-processor"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: ml-output
              mountPath: /opt/airflow/project/python/output
            - name: dashboard-data
              mountPath: /opt/airflow/project/src/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: ml-output
          persistentVolumeClaim:
            claimName: ml-output
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data
