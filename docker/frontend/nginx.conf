server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream hostnames re-resolve after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $ml_server_upstream http://ml-server:8000;

    # Proxy RAG + model API calls to the ml-server container
    # Strip the /api prefix before forwarding
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $ml_server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        error_page 502 503 504 = @api_unavailable;
    }

    location @api_unavailable {
        default_type application/json;
        return 503 '{"detail":"RAG API is starting up. Please try again in a moment."}';
    }

    # Serve dashboard.json from the shared volume (written by ws-server)
    location /data/ {
        alias /usr/share/nginx/html/data/;
        add_header Cache-Control "no-store";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
