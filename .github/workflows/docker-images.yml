name: Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/airflow/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ml-airflow-custom:latest
            ghcr.io/${{ github.repository_owner }}/ml-airflow-custom:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ws-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ws-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ml-ws-server:latest
            ghcr.io/${{ github.repository_owner }}/ml-ws-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ml-frontend:latest
            ghcr.io/${{ github.repository_owner }}/ml-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ml-pipeline image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ml-pipeline/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ml-ml-pipeline:latest
            ghcr.io/${{ github.repository_owner }}/ml-ml-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin image SHA in production overlay
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bash scripts/pin-images.sh "${{ github.sha }}"
          git add kubernetes/infra/kustomization.yaml kubernetes/data/kustomization.yaml kubernetes/ml/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore(k8s): pin production images to ${{ github.sha }} [skip ci]"
          git push
