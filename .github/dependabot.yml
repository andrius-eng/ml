version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: pip
    directory: /airflow
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: docker
    directory: /docker/airflow
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: docker
    directory: /docker/frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: docker
    directory: /docker/ml-pipeline
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: docker
    directory: /docker/ws-server
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
