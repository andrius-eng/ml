# Apache Airflow 3.x — LocalExecutor + PostgreSQL
# Usage:
#   docker compose up -d          # start all services
#   docker compose down -v        # tear down + remove volumes
#
# First-time setup:
#   docker compose run --rm airflow-init   # migrates the DB, then exits
#   docker compose up -d                 # start api-server + scheduler

x-airflow-common: &airflow-common
  image: apache/airflow:3.1.8
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_INTERNAL_API_SECRET_KEY:-dev-internal-secret-change-in-production}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:Admin"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__SCHEDULER__STANDALONE_DAG_PROCESSOR: "True"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-dev-secret-change-in-production}
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    PYTHONWARNINGS: "ignore::SyntaxWarning"
    # Pass through the Python binary and project root used in BashOperator commands
    ML_PROJECT_ROOT: /opt/airflow/project
    TRAIN_PYTHON_BIN: /usr/local/bin/python
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # Mount the whole project so scripts and outputs are available
    - .:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: ["api-server", "--host", "0.0.0.0", "--port", "8080", "--workers", "2"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --max-time 10 http://127.0.0.1:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 240s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 60s
      retries: 10
      start_period: 240s
    restart: unless-stopped

volumes:
  postgres-db-volume:
