global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: ml-server
    static_configs:
      - targets: ['ml-server:8000']
    metrics_path: /metrics

  - job_name: airflow
    static_configs:
      - targets: ['airflow-webserver:8080']
    metrics_path: /metrics

  - job_name: flink
    static_configs:
      - targets: ['flink-jobmanager:8081']
    metrics_path: /metrics
